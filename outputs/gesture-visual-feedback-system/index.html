<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>互动效果入口</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body class="home-page">
    <main class="home-shell">
      <section class="home-hero">
        <div class="home-copy">
          <span class="home-kicker">Interactive Lab</span>
          <h1>选择一个互动效果</h1>
          <p>这里会逐步加入多个可体验的互动模块。当前已经接入的是手势粒子控制。</p>
        </div>
      </section>

      <section class="interaction-grid" aria-label="互动效果列表">
        <a class="interaction-card interaction-card-active" href="./particle.html">
          <span class="card-index">01</span>
          <strong>手势粒子控制</strong>
          <span>摄像头识别手势，控制粒子聚合、铺满、旋转、爱心和照片聚焦。</span>
          <em>进入互动</em>
        </a>

        <article class="interaction-card interaction-card-disabled">
          <span class="card-index">02</span>
          <strong>声音视觉互动</strong>
          <span>预留模块，可接入麦克风音量、节奏或音乐驱动的视觉效果。</span>
          <em>即将加入</em>
        </article>

        <article class="interaction-card interaction-card-disabled">
          <span class="card-index">03</span>
          <strong>触摸光场互动</strong>
          <span>预留模块，可用于手机触摸、拖拽、多点触控生成光场效果。</span>
          <em>即将加入</em>
        </article>
      </section>
    </main>
  </body>
</html>
