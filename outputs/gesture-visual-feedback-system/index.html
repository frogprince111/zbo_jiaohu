<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Gesture Visual Feedback System</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage">
        <canvas id="gesture-canvas"></canvas>
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="hand-overlay"></canvas>
        <div class="hud">
          <div>
            <span class="label">Gesture</span>
            <strong id="gesture-name">waiting</strong>
          </div>
          <div>
            <span class="label">Mode</span>
            <strong id="effect-name">fullscreen_field</strong>
          </div>
          <div>
            <span class="label">Confidence</span>
            <strong id="confidence">0.00</strong>
          </div>
          <div>
            <span class="label">Particles</span>
            <strong id="active-count">0</strong>
          </div>
        </div>
      </section>
      <aside class="panel">
        <header>
          <h1>Gesture FX</h1>
          <button id="camera-toggle" type="button">Start Camera</button>
        </header>
        <p id="camera-status" class="status">Camera idle. Use fist, open palm/both hands, one finger, two fingers, thumb, or pinch.</p>
        <label class="upload-control">
          <span>Upload Photos</span>
          <input id="photo-input" type="file" accept="image/*" multiple />
        </label>
        <p id="photo-status" class="status">No photos uploaded.</p>
        <button id="mock-toggle" type="button">Start Mock</button>
        <div class="gesture-grid">
          <button data-gesture="fist">Fist / 聚合</button>
          <button data-gesture="open_palm">Open Palm / 铺满</button>
          <button data-gesture="one_finger">One Finger / 顺时针</button>
          <button data-gesture="two_fingers">Two Fingers / 逆时针</button>
          <button data-gesture="thumb">Thumb / 3D Heart</button>
          <button data-gesture="pinch">Pinch / Random Photo</button>
        </div>
      </aside>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="./src/app.classic.js"></script>
  </body>
</html>
