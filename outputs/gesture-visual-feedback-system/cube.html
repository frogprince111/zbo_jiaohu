<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>手势立方体</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preload" href="./vendor/three/three.min.js" as="script" />
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" as="script" crossorigin />
    <link rel="stylesheet" href="./src/styles.css?v=20260712" />
  </head>
  <body class="cube-page">
    <main class="app">
      <section class="stage">
        <canvas id="gesture-canvas"></canvas>
        <video id="camera-video" autoplay playsinline webkit-playsinline muted></video>
        <canvas id="hand-overlay"></canvas>
        <button id="stage-exit-fullscreen" class="stage-exit" type="button">退出全屏</button>
        <div class="hud">
          <div>
            <span class="label">Module</span>
            <strong>cube</strong>
          </div>
          <div>
            <span class="label">Trigger</span>
            <strong id="gesture-name">waiting</strong>
          </div>
          <div>
            <span class="label">Mode</span>
            <strong id="effect-name">standby</strong>
          </div>
          <div>
            <span class="label">Shape</span>
            <strong id="active-count">0</strong>
          </div>
        </div>
      </section>
      <aside class="panel">
        <header>
          <h1>Cube FX</h1>
          <div class="header-actions">
            <a class="nav-button" href="./index.html">首页</a>
            <button id="fullscreen-toggle" type="button">全屏</button>
            <button id="camera-toggle" type="button">开启摄像头</button>
          </div>
        </header>
        <p id="camera-status" class="status">任意一只手先捏合后张开生成空立方体；另一只手张开让图像爆成粉末，握拳让粉末合成图片中的物体模型。</p>
        <button id="mock-toggle" type="button">开始模拟</button>
        <div class="gesture-grid">
          <button data-cube-action="summon">捏合后张开 / 空立方体</button>
          <button data-cube-action="shape">另一只手握拳 / 立体动画</button>
          <button data-cube-action="particles">另一只手张开 / 粉末</button>
        </div>
      </aside>
    </main>
    <script src="./vendor/three/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="./src/cube.classic.js?v=20260712"></script>
  </body>
</html>
